name: Feature Request
description: Suggest a new feature or improvement for Vacademy
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please provide as much detail as possible so we can evaluate and prioritize your request.

  - type: textarea
    id: problem-description
    attributes:
      label: Problem Description
      description: Describe the problem or limitation this feature would address.
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see implemented.
      placeholder: It would be helpful if ...
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you have considered.
      placeholder: I also considered ...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or references that would help us understand the request.
      placeholder: Any relevant links, screenshots, or examples.
    validations:
      required: false
