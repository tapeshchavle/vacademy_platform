name: Deploy Media to VET EKS

on:
  push:
    branches:
      - main
    paths:
      - "media_service/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: vet-education
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Authenticate GitHub Package Registry
        env:
          JAVA_TOKEN: ${{ secrets.JAVA_TOKEN }}
          ACCESS_GITHUB_USERNAME: ${{ secrets.ACCESS_GITHUB_USERNAME }}
        run: |
          echo "${JAVA_TOKEN}" | docker login ghcr.io -u ${ACCESS_GITHUB_USERNAME} --password-stdin
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>${ACCESS_GITHUB_USERNAME}</username><password>${JAVA_TOKEN}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Build Project
        working-directory: ./media_service
        env:
          JAVA_TOKEN: ${{ secrets.JAVA_TOKEN }}
          ACCESS_GITHUB_USERNAME: ${{ secrets.ACCESS_GITHUB_USERNAME }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: mvn -s settings.xml clean install -DskipTests -Dsentry.authToken=$SENTRY_AUTH_TOKEN

      - name: Configure AWS credentials for ECR Public
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        working-directory: ./media_service
        env:
          ECR_REGISTRY: public.ecr.aws/h3e7x6t4
          IMAGE_TAG: latest
          REPOSITORY: media-service/media-service-repo
          GITHUB_TOKEN: ${{ secrets.JAVA_TOKEN }}
          ACCESS_GITHUB_USERNAME: ${{ secrets.ACCESS_GITHUB_USERNAME }}
          JAVA_TOKEN: ${{ secrets.JAVA_TOKEN }}
          S3_AWS_ACCESS_KEY: ${{ secrets.S3_AWS_ACCESS_KEY }}
          S3_AWS_ACCESS_SECRET: ${{ secrets.S3_AWS_ACCESS_SECRET }}
          S3_AWS_REGION: ${{ secrets.S3_AWS_REGION }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG . --build-arg GITHUB_TOKEN=${GITHUB_TOKEN} --build-arg ACCESS_GITHUB_USERNAME=${ACCESS_GITHUB_USERNAME} --build-arg JAVA_TOKEN=${JAVA_TOKEN} --build-arg SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
          docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "Docker Image Link = $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Configure AWS credentials for EKS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.VET_EKS_REGION }}

      - name: Connect to EKS cluster
        run: |
          aws eks update-kubeconfig --name ${{ secrets.VET_EKS_CLUSTER_NAME }} --region ${{ secrets.VET_EKS_REGION }}

      - name: Deploy to Kubernetes
        run: |
          kubectl set env deployment/media-service \
            DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            DB_USERNAME=${{ secrets.DB_USERNAME }} \
            APP_USERNAME=${{ secrets.APP_USERNAME }} \
            APP_PASSWORD=${{ secrets.APP_PASSWORD }} \
            CLOUD_FRONT_URL=${{ secrets.CLOUD_FRONT_URL }} \
            MEDIA_SERVICE_DB_URL=jdbc:postgresql://${{ secrets.VET_DB_HOST }}:5432/media_service \
            MEDIA_SERVICE_READ_DB_URL=jdbc:postgresql://${{ secrets.VET_DB_HOST }}:5432/media_service_read \
            S3_AWS_ACCESS_KEY=${{ secrets.S3_AWS_ACCESS_KEY }} \
            S3_AWS_ACCESS_SECRET=${{ secrets.S3_AWS_ACCESS_SECRET }} \
            S3_AWS_REGION=${{ secrets.S3_AWS_REGION }} \
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }} \
            AWS_S3_PUBLIC_BUCKET=${{ secrets.AWS_S3_PUBLIC_BUCKET }} \
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }} \
            UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }} \
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }} \
            SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            CLOUD_CONVERT_KEY=${{ secrets.CLOUD_CONVERT_KEY }}

      - name: Restart deployment
        env:
          DEPLOYMENT_NAME: media-service
          NAMESPACE: default
        run: |
          kubectl rollout restart deployment $DEPLOYMENT_NAME --namespace $NAMESPACE
