name: Deploy AI Service to VET EKS

on:
  push:
    branches:
      - main
    paths:
      - "ai_service/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: vet-education
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Configure AWS credentials for ECR Public
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        working-directory: ./ai_service
        env:
          ECR_REGISTRY: public.ecr.aws/h3e7x6t4
          IMAGE_TAG: latest
          REPOSITORY: ai-service/ai-service-repo
        run: |
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "Docker Image Link = $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Configure AWS credentials for EKS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.VET_EKS_REGION }}

      - name: Connect to EKS cluster
        run: |
          aws eks update-kubeconfig --name ${{ secrets.VET_EKS_CLUSTER_NAME }} --region ${{ secrets.VET_EKS_REGION }}

      - name: Restart deployment if it exists
        env:
          DEPLOYMENT_NAME: ai-service
          NAMESPACE: default
        run: |
          if kubectl get deployment "$DEPLOYMENT_NAME" --namespace "$NAMESPACE" >/dev/null 2>&1; then
            kubectl set env deployment/"$DEPLOYMENT_NAME" \
              --namespace "$NAMESPACE" \
              environment=stage \
              APP_ENV=stage \
              LLM_BASE_URL=https://openrouter.ai/api/v1/chat/completions \
              "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
              LLM_TIMEOUT_SECONDS=60.0 \
              "S3_AWS_ACCESS_KEY=${{ secrets.S3_AWS_ACCESS_KEY }}" \
              "S3_AWS_ACCESS_SECRET=${{ secrets.S3_AWS_ACCESS_SECRET }}" \
              "S3_AWS_REGION=${{ secrets.S3_AWS_REGION }}" \
              "AWS_BUCKET_NAME=${{ secrets.AWS_S3_PUBLIC_BUCKET }}" \
              "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
              "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" \
              LLM_DEFAULT_MODEL=google/gemini-2.5-flash \
              "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              "ADMIN_CORE_SERVICE_DB_URL=${{ secrets.ADMIN_CORE_SERVICE_DB_URL }}" \
              "DB_HOST=${{ secrets.DB_HOST }}" \
              "DB_PORT=${{ secrets.DB_PORT }}"

            kubectl patch deployment "$DEPLOYMENT_NAME" --namespace "$NAMESPACE" --type=strategic \
              --patch '{
                "spec": {
                  "template": {
                    "spec": {
                      "containers": [{
                        "name": "ai-service",
                        "resources": {
                          "requests": { "cpu": "500m", "memory": "1Gi" },
                          "limits":   { "cpu": "1500m", "memory": "3Gi" }
                        }
                      }]
                    }
                  }
                }
              }'

            kubectl rollout restart deployment "$DEPLOYMENT_NAME" --namespace "$NAMESPACE"
          else
            echo "Deployment $DEPLOYMENT_NAME not found in namespace $NAMESPACE. Skipping restart."
          fi
