apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-service
  namespace: default
  labels:
    app: community-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: community-service
  template:
    metadata:
      labels:
        app: community-service
    spec:
      containers:
        - name: community-service
          image: "public.ecr.aws/h3e7x6t4/community-service/community-service-repo:latest"
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "500m"
              memory: "700Mi"
            limits:
              cpu: "2000m"
              memory: "1400Mi"
          livenessProbe:
            httpGet:
              path: /community-service/actuator/health
              port: 8073
              scheme: HTTP
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /community-service/actuator/health
              port: 8073
              scheme: HTTP
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /community-service/actuator/health
              port: 8073
              scheme: HTTP
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          ports:
            - containerPort: 8073
