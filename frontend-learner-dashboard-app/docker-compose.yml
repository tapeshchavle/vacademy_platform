# Docker Compose for Vacademy Learner Dashboard - Development Environment
version: '3.8'

services:
  # Main application service
  vacademy-learner:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: vacademy-learner:dev
    container_name: vacademy-learner-dev
    ports:
      - "${HOST_PORT:-3000}:80"
    environment:
      # API Configuration
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://backend-stage.vacademy.io}
      - VITE_INSTITUTE_ID=${VITE_INSTITUTE_ID:-c70f40a5-e4d3-4b6c-a498-e612d0d4b133}
      
      # Firebase Configuration
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET:-}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-}
      - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID:-}
      
      # Analytics
      - VITE_AMPLITUDE_API_KEY=${VITE_AMPLITUDE_API_KEY:-}
      
      # App Configuration
      - VITE_APP_NAME=${VITE_APP_NAME:-Vacademy Learner}
      - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.3}
      - VITE_ENVIRONMENT=${VITE_ENVIRONMENT:-development}
      
      # Feature Flags
      - VITE_ENABLE_ANALYTICS=${VITE_ENABLE_ANALYTICS:-true}
      - VITE_ENABLE_PUSH_NOTIFICATIONS=${VITE_ENABLE_PUSH_NOTIFICATIONS:-true}
      - VITE_ENABLE_PROCTORING=${VITE_ENABLE_PROCTORING:-true}
      
      # Debug Settings (enabled for development)
      - VITE_DEBUG_MODE=${VITE_DEBUG_MODE:-true}
      - VITE_LOG_LEVEL=${VITE_LOG_LEVEL:-debug}
    volumes:
      # Mount for nginx logs
      - ./logs/nginx:/var/log/nginx
    networks:
      - vacademy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.vacademy.app=learner-dashboard"
      - "com.vacademy.environment=development"

  # Optional: Redis for caching (uncomment if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: vacademy-redis-dev
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - vacademy-network
  #   restart: unless-stopped

networks:
  vacademy-network:
    driver: bridge
    name: vacademy-dev-network

volumes:
  # Uncomment if using Redis
  # redis_data:
  nginx_logs: 