<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Authentication</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .message {
            color: #475569;
            font-size: 14px;
        }
        .error {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="status">Processing OAuth authentication...</div>
        <div class="message">Please wait while we complete your signup process.</div>
    </div>

    <script>
        // Function to send message to parent window
        function sendToParent(type, data) {
                if (window.opener) {
                window.opener.postMessage({ type, data }, '*');
                window.close();
            }
        }

        // Function to show error
        function showError(message) {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('.status').textContent = 'Authentication Failed';
            document.querySelector('.message').textContent = message;
            
            // Add error display
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            document.querySelector('.container').appendChild(errorDiv);
            
            // Auto-close after 3 seconds
            setTimeout(() => {
                window.close();
            }, 3000);
        }

        // Parse URL parameters
        function parseUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            return {
                signupData: urlParams.get('signupData'),
                state: urlParams.get('state'),
                emailVerified: urlParams.get('emailVerified'),
                error: urlParams.get('error') || hashParams.get('error'),
                error_description: urlParams.get('error_description') || hashParams.get('error_description')
            };
        }

        // Handle OAuth success
        function handleOAuthSuccess(params) {
            try {
                // Decode base64 parameters
                const signupData = params.signupData ? JSON.parse(atob(params.signupData)) : null;
                const state = params.state ? JSON.parse(atob(params.state)) : null;
                
                if (!signupData || !state) {
                    throw new Error('Invalid OAuth response data');
                }

                // Send success data to parent window
                sendToParent('oauth_success', {
                    signupData,
                    state,
                    emailVerified: params.emailVerified === 'true'
                });

            } catch (error) {
                console.error('Error parsing OAuth data:', error);
                showError('Failed to process OAuth response. Please try again.');
            }
        }

        // Handle OAuth error
        function handleOAuthError(params) {
            const errorMessage = params.error_description || params.error || 'OAuth authentication failed';
            showError(errorMessage);
        }

        // Main execution
        try {
            const params = parseUrlParams();
            
            console.log('OAuth Popup: Received parameters:', {
                hasSignupData: !!params.signupData,
                hasState: !!params.state,
                emailVerified: params.emailVerified,
                error: params.error,
                errorDescription: params.error_description
            });
            
            // Special case: error=true with signupData means "email not found" (new user) - this is SUCCESS for signup
            if (params.error === 'true' && params.signupData && params.state) {
                console.log('OAuth: Email not found (new user) - proceeding with signup');
                handleOAuthSuccess(params);
            } else if (params.error && !params.signupData) {
                // Real OAuth error (no user data)
                console.log('OAuth: Real error detected - showing error');
                handleOAuthError(params);
                } else {
                // Normal OAuth success
                console.log('OAuth: Normal success - proceeding with signup');
                handleOAuthSuccess(params);
            }
        } catch (error) {
            console.error('Unexpected error:', error);
            showError('An unexpected error occurred. Please try again.');
        }
    </script>
</body>
</html>
